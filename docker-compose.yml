version: '3.9'
services:
  web:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastcomm
      OPENAI_API_KEY: 
    depends_on:
      - db
    volumes:
      - .:/app
    command: npm run dev
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fastcomm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
